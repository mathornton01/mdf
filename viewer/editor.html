<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MDF Editor — Morphous Document Format</title>
  <style>
    :root {
      --bg:         #0f1117;
      --surface:    #181b24;
      --surface-2:  #1e2130;
      --surface-3:  #252a3a;
      --border:     #2a2e3e;
      --border-2:   #353a52;
      --text:       #e8eaf0;
      --text-muted: #8890a8;
      --text-dim:   #555d78;
      --accent:     #6c7dff;
      --accent-2:   #8b6fff;
      --accent-glow:rgba(108,125,255,0.15);
      --success:    #3dd68c;
      --warn:       #f0a050;
      --danger:     #ff5e6d;
      --radius:     8px;
      --radius-lg:  12px;
      --shadow:     0 4px 24px rgba(0,0,0,0.5);
      --shadow-lg:  0 8px 48px rgba(0,0,0,0.7);
      --font-sans:  'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --font-mono:  'JetBrains Mono', 'Fira Code', monospace;
      --transition: 0.15s cubic-bezier(0.4,0,0.2,1);
      --header-h:   48px;
      --tool-w:     56px;
      --panel-w:    272px;
      --status-h:   26px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: var(--font-sans); background: var(--bg); color: var(--text); font-size: 13px; line-height: 1.5; }

    /* ===== LAYOUT ===== */
    #app {
      display: grid;
      grid-template-rows: var(--header-h) 1fr var(--status-h);
      grid-template-columns: var(--tool-w) 1fr var(--panel-w);
      height: 100vh;
    }
    #header {
      grid-column: 1 / -1;
      display: flex; align-items: center; gap: 8px;
      padding: 0 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      z-index: 20;
    }
    #tool-strip {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; align-items: center;
      padding: 8px 0; gap: 2px;
      overflow-y: auto; overflow-x: hidden;
    }
    #canvas-area {
      background: var(--bg);
      background-image: radial-gradient(circle, rgba(108,125,255,0.06) 1px, transparent 1px);
      background-size: 20px 20px;
      overflow: auto;
      position: relative;
      display: flex; align-items: flex-start; justify-content: flex-start;
    }
    #right-panel {
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    #status-bar {
      grid-column: 1 / -1;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 16px;
      padding: 0 12px;
      font-size: 11px; color: var(--text-muted);
      font-family: var(--font-mono);
    }

    /* ===== HEADER ===== */
    .logo-mark {
      width: 28px; height: 28px; border-radius: 7px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .logo-text { font-size: 14px; font-weight: 700; letter-spacing: -0.02em; }
    .header-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
    .header-spacer { flex: 1; }
    .hbtn {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 10px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text); font-size: 12px; font-weight: 500;
      cursor: pointer; font-family: var(--font-sans);
      transition: background var(--transition), border-color var(--transition);
      white-space: nowrap;
    }
    .hbtn:hover { background: var(--surface-3); border-color: var(--border-2); }
    .hbtn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .hbtn.primary:hover { opacity: 0.88; }
    .hbtn.danger { background: var(--danger); border-color: var(--danger); color: #fff; }
    .hbtn.icon-only { padding: 5px 7px; }

    /* ===== CANVAS SHAPE BUTTON ===== */
    #canvas-shape-btn {
      display: flex; align-items: center; gap: 7px;
      padding: 4px 10px 4px 8px;
      background: var(--surface-2);
      border: 1.5px solid var(--accent);
      border-radius: var(--radius);
      color: var(--text); font-size: 12px; font-weight: 500;
      cursor: pointer; font-family: var(--font-sans);
      transition: background var(--transition), border-color var(--transition), box-shadow var(--transition);
      white-space: nowrap;
      box-shadow: 0 0 0 0 var(--accent-glow);
    }
    #canvas-shape-btn:hover {
      background: var(--surface-3);
      border-color: var(--accent-2);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    #canvas-shape-btn .csb-preview { flex-shrink: 0; }
    #canvas-shape-btn .csb-label { font-weight: 600; color: var(--text); }
    #canvas-shape-btn .csb-dims { font-size: 10px; color: var(--text-muted); margin-left: 2px; }
    #canvas-shape-btn .csb-chevron { color: var(--text-dim); font-size: 10px; margin-left: 2px; }

    /* ===== TOOL STRIP ===== */
    .tool-btn {
      width: 44px; height: 44px; border-radius: var(--radius);
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 2px; font-size: 10px; font-family: var(--font-sans);
      transition: background var(--transition), color var(--transition), border-color var(--transition);
      position: relative;
    }
    .tool-btn svg { flex-shrink: 0; }
    .tool-btn:hover { background: var(--surface-2); color: var(--text); }
    .tool-btn.active {
      background: var(--accent-glow);
      border-color: rgba(108,125,255,0.4);
      color: var(--accent);
    }
    .tool-sep { width: 28px; height: 1px; background: var(--border); margin: 4px 0; }

    /* ===== RIGHT PANEL ===== */
    #panel-body {
      flex: 1; overflow-y: auto; padding: 12px;
      display: flex; flex-direction: column; gap: 10px;
    }
    #panel-body::-webkit-scrollbar { width: 4px; }
    #panel-body::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 2px; }
    .panel-section { display: flex; flex-direction: column; gap: 6px; }
    .panel-section-title {
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-dim); padding-bottom: 2px;
    }
    .field-row { display: flex; align-items: center; gap: 6px; }
    .field-label { font-size: 11px; color: var(--text-muted); min-width: 36px; flex-shrink: 0; }
    .field-label-wide { font-size: 11px; color: var(--text-muted); min-width: 54px; flex-shrink: 0; }
    input[type=text], input[type=number], select, textarea {
      background: var(--surface-2); border: 1px solid var(--border);
      color: var(--text); border-radius: 5px;
      font-family: var(--font-sans); font-size: 12px;
      padding: 4px 7px; outline: none;
      transition: border-color var(--transition);
    }
    input[type=text]:focus, input[type=number]:focus, select:focus, textarea:focus {
      border-color: var(--accent);
    }
    input[type=number] { width: 60px; }
    input[type=text] { flex: 1; }
    select { flex: 1; cursor: pointer; }
    textarea {
      width: 100%; resize: vertical; min-height: 60px;
      font-family: var(--font-mono); font-size: 11px;
    }
    input[type=range] {
      flex: 1; accent-color: var(--accent); cursor: pointer; height: 4px;
    }
    input[type=color] {
      width: 32px; height: 28px; border: 1px solid var(--border);
      border-radius: 5px; cursor: pointer; padding: 2px;
      background: var(--surface-2);
    }
    .range-val { font-size: 11px; color: var(--text-muted); min-width: 32px; text-align: right; font-family: var(--font-mono); }
    .checkbox-row { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted); cursor: pointer; }
    .checkbox-row input { accent-color: var(--accent); cursor: pointer; }

    /* ===== CANVAS INFO (idle right panel) ===== */
    .canvas-info-preview {
      width: 80px; height: 80px;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface-2);
      border: 1.5px solid var(--accent);
      border-radius: var(--radius);
      margin: 0 auto 8px;
    }
    .canvas-info-text {
      text-align: center;
      font-size: 12px; color: var(--text-muted);
      margin-bottom: 8px;
    }
    .canvas-info-name {
      font-weight: 600; color: var(--text); font-size: 13px;
    }
    .tool-hint-list {
      display: flex; flex-direction: column; gap: 3px;
      margin-top: 4px;
    }
    .tool-hint-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; color: var(--text-muted);
    }
    .tool-hint-key {
      display: inline-flex; align-items: center; justify-content: center;
      width: 18px; height: 18px;
      background: var(--surface-3); border: 1px solid var(--border-2);
      border-radius: 4px; font-size: 10px; font-weight: 700;
      color: var(--text-dim); font-family: var(--font-mono);
      flex-shrink: 0;
    }

    /* ===== CANVAS EDITOR ===== */
    #editor-svg-wrap {
      position: relative;
      display: inline-block;
      margin: 24px;
    }
    #editor-svg {
      display: block;
      cursor: crosshair;
    }
    #editor-svg.tool-select { cursor: default; }

    /* ===== ZOOM PILL ===== */
    #zoom-pill {
      position: absolute; bottom: 12px; left: 50%;
      transform: translateX(-50%);
      display: flex; align-items: center; gap: 2px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 50px; padding: 4px 8px;
      box-shadow: var(--shadow); z-index: 10; pointer-events: all;
    }
    .zpbtn {
      width: 24px; height: 24px; border: none; background: transparent;
      color: var(--text); border-radius: 50%; cursor: pointer;
      font-size: 15px; display: flex; align-items: center; justify-content: center;
      transition: background var(--transition); font-family: var(--font-sans);
    }
    .zpbtn:hover { background: var(--surface-2); }
    #zoom-label { font-size: 11px; font-weight: 600; color: var(--text-muted); min-width: 40px; text-align: center; font-family: var(--font-mono); }

    /* ===== EMPTY SHAPE PANEL ===== */
    .no-selection {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: var(--text-dim); font-size: 12px; text-align: center; padding: 20px;
    }

    /* ===== DIVIDER ===== */
    .panel-divider { height: 1px; background: var(--border); margin: 2px 0; }

    /* ===== NOTIFICATION ===== */
    #notif {
      position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 8px 16px;
      font-size: 12px; color: var(--text);
      box-shadow: var(--shadow); z-index: 999;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    #notif.show { opacity: 1; }

    /* ===== MODAL BACKDROP ===== */
    .modal-backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-backdrop.show { display: flex; }

    /* ===== CONFIRM MODAL ===== */
    .modal-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 20px;
      box-shadow: var(--shadow-lg);
    }
    #confirm-modal .modal-box {
      min-width: 320px; max-width: 480px; width: 90%;
    }
    #confirm-modal .modal-box h3 { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
    #confirm-modal .modal-box p { font-size: 12px; color: var(--text-muted); margin-bottom: 16px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

    /* ===== CANVAS MODAL ===== */
    #canvas-modal .modal-box {
      width: 90%; max-width: 680px;
      max-height: 90vh;
      display: flex; flex-direction: column;
      padding: 0;
    }
    .canvas-modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .canvas-modal-header h3 { font-size: 15px; font-weight: 700; }
    .canvas-modal-close {
      background: none; border: none; color: var(--text-muted);
      font-size: 20px; cursor: pointer; line-height: 1;
      padding: 0 4px;
      transition: color var(--transition);
    }
    .canvas-modal-close:hover { color: var(--text); }
    .canvas-modal-body {
      flex: 1; overflow-y: auto; padding: 16px 20px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .canvas-modal-body::-webkit-scrollbar { width: 4px; }
    .canvas-modal-body::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 2px; }
    .canvas-modal-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .canvas-modal-hint { font-size: 11px; color: var(--text-dim); }
    .canvas-modal-section-title {
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-dim); margin-bottom: 8px;
    }

    /* Quick sizes chips */
    .quick-sizes {
      display: flex; flex-wrap: wrap; gap: 6px;
    }
    .size-chip {
      padding: 4px 10px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 20px; font-size: 11px; font-weight: 500;
      color: var(--text-muted); cursor: pointer;
      transition: background var(--transition), border-color var(--transition), color var(--transition);
      white-space: nowrap;
    }
    .size-chip:hover { background: var(--surface-3); border-color: var(--border-2); color: var(--text); }
    .size-chip.active { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); font-weight: 700; }

    /* Preset grid (large, for modal) */
    .presets-grid-lg {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }
    .preset-tile-lg {
      border-radius: 8px;
      background: var(--surface-2); border: 1.5px solid var(--border);
      cursor: pointer; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
      transition: border-color var(--transition), background var(--transition);
      padding: 6px; min-height: 52px;
    }
    .preset-tile-lg:hover { border-color: var(--border-2); background: var(--surface-3); }
    .preset-tile-lg.active { border-color: var(--accent); background: var(--accent-glow); }
    .preset-tile-lg svg { display: block; max-width: 60px; max-height: 60px; }
    .preset-tile-lg-label { font-size: 9px; color: var(--text-muted); text-align: center; line-height: 1.2; }

    /* Modal dims row */
    .canvas-modal-dims-row {
      display: flex; align-items: center; gap: 10px;
    }
    .canvas-modal-dims-row .field-label { min-width: 20px; }

    /* Modal contextual slider */
    .canvas-modal-slider-row {
      display: flex; align-items: center; gap: 8px;
      margin-top: 8px;
    }
    .canvas-modal-slider-label {
      font-size: 11px; color: var(--text-muted); min-width: 100px;
    }

    /* Custom path mini preview */
    .canvas-modal-custom-preview {
      width: 100%; height: 100px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--radius); display: flex;
      align-items: center; justify-content: center;
      margin-top: 6px; overflow: hidden;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div id="header">
    <div class="logo-mark">
      <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
        <path d="M9 1L16.5 5.5V12.5L9 17L1.5 12.5V5.5L9 1Z" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
        <circle cx="9" cy="9" r="2.5" fill="white"/>
      </svg>
    </div>
    <span class="logo-text">MDF Editor</span>
    <div class="header-sep"></div>
    <button class="hbtn" onclick="newDocument()" title="New document">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M7.5 1H3a1 1 0 00-1 1v9a1 1 0 001 1h7a1 1 0 001-1V5.5M7.5 1L11 4.5M7.5 1v3.5H11" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      New
    </button>
    <button class="hbtn" onclick="document.getElementById('file-input-el').click()" title="Open .mdf file">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 4.5V10a1 1 0 001 1h7a1 1 0 001-1V5.5a1 1 0 00-1-1H6.5L5.5 3H3a1 1 0 00-1 1z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Open
    </button>
    <input type="file" id="file-input-el" accept=".mdf,.xml" style="display:none">
    <button class="hbtn primary" onclick="saveMDF()" title="Save as .mdf (Cmd+S)">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 2.5A.5.5 0 012.5 2h6.793L11 3.707V10.5a.5.5 0 01-.5.5h-8a.5.5 0 01-.5-.5v-8zM4.5 11V7.5h4V11M8.5 2v3H4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Save .mdf
    </button>
    <button class="hbtn" onclick="exportPDF()" title="Export PDF">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M7.5 1H3a1 1 0 00-1 1v9a1 1 0 001 1h7a1 1 0 001-1V5.5M7.5 1L11 4.5M7.5 1v3.5H11M4 8h5M4 6h3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Export PDF
    </button>
    <div class="header-sep"></div>
    <!-- Canvas shape button -->
    <button id="canvas-shape-btn" onclick="openCanvasModal()" title="Canvas shape (P)">
      <span class="csb-preview" id="csb-preview-svg"></span>
      <span class="csb-label" id="csb-label">Rectangle</span>
      <span class="csb-dims" id="csb-dims">210×297 mm</span>
      <span class="csb-chevron">▾</span>
    </button>
    <div class="header-spacer"></div>
    <!-- Undo / Redo -->
    <button class="hbtn icon-only" id="header-undo-btn" onclick="undo()" title="Undo (Ctrl+Z)">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7a5 5 0 105-5H4M2 7V3m0 4H6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button class="hbtn icon-only" id="header-redo-btn" onclick="redo()" title="Redo (Ctrl+Y)">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M12 7a5 5 0 10-5-5h3M12 7V3m0 4H8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="header-sep"></div>
    <button class="hbtn" onclick="window.open('index.html','_blank')" title="Open in Viewer">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 2.5h4v4M10.5 2.5L5.5 7.5M2 3.5v7h7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      View →
    </button>
  </div>

  <!-- TOOL STRIP -->
  <div id="tool-strip">
    <button class="tool-btn active" id="tool-select" onclick="setTool('select')" title="Select (V)">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 2l10 5.5-5.5 1.5L5 14z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
      <span>V</span>
    </button>
    <div class="tool-sep"></div>
    <button class="tool-btn" id="tool-rect" onclick="setTool('rect')" title="Rectangle (R)">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2.5" y="4" width="11" height="8" rx="1" stroke="currentColor" stroke-width="1.3"/></svg>
      <span>R</span>
    </button>
    <button class="tool-btn" id="tool-circle" onclick="setTool('circle')" title="Circle (C)">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.3"/></svg>
      <span>C</span>
    </button>
    <button class="tool-btn" id="tool-ellipse" onclick="setTool('ellipse')" title="Ellipse (E)">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><ellipse cx="8" cy="8" rx="6" ry="4" stroke="currentColor" stroke-width="1.3"/></svg>
      <span>E</span>
    </button>
    <button class="tool-btn" id="tool-line" onclick="setTool('line')" title="Line (L)">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2.5 13L13.5 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span>L</span>
    </button>
    <button class="tool-btn" id="tool-text" onclick="setTool('text')" title="Text (T)">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 4h10M8 4v8M5.5 12h5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      <span>T</span>
    </button>
    <button class="tool-btn" id="tool-path" onclick="setTool('path')" title="Polygon / Path (A)">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2l2.5 4h4L11 9l1.5 4L8 11l-4.5 2L5 9 1.5 6h4z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
      <span>A</span>
    </button>
  </div>

  <!-- CANVAS AREA -->

    </div>
    <div id="zoom-pill">
      <button class="zpbtn" id="zoom-out-btn" title="Zoom out (-)">−</button>
      <span id="zoom-label">100%</span>
      <button class="zpbtn" id="zoom-in-btn" title="Zoom in (+)">+</button>
      <button class="zpbtn" id="zoom-fit-btn" title="Fit (0)" style="font-size:11px">⊡</button>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div id="right-panel">
    <div id="panel-body">
      <!-- Content injected by updateRightPanel() -->
    </div>

  <!-- STATUS BAR -->
  <div id="status-bar">
    <span id="status-pos">x: 0, y: 0</span>
    <span id="status-sel">Rectangle</span>

</div>

<!-- CONFIRM MODAL -->

      <button class="hbtn" id="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="hbtn primary" id="modal-ok" onclick="confirmModal()">OK</button>

<!-- CANVAS MODAL -->
<div id="canvas-modal" class="modal-backdrop">
  <div class="modal-box">
    <div class="canvas-modal-header">
      <h3>Canvas Shape</h3>
      <button class="canvas-modal-close" onclick="closeCanvasModal()" title="Close">×</button>
    </div>
    <div class="canvas-modal-body" id="canvas-modal-body">
      <!-- Injected by updateCanvasModal() -->
    </div>
